server:
  bind: 0.0.0.0:8080
  request_timeout_ms: 600000
  default_project_id: default

storage:
  profile: standard
  postgres:
    url: postgres://gateway:gatewaypass@postgres:5432/gateway
    max_connections: 32
  redis:
    url: redis://redis:6379/0
  cache:
    l1_memory_mb: 256
    l2_max_size_mb: 1024

admin:
  root_token_env: GATEWAY_ROOT_TOKEN
  password_login: true

providers:
  openai:
    base_url: https://api.openai.com
    credential_ref: env://OPENAI_API_KEY
  anthropic:
    base_url: https://api.anthropic.com
    credential_ref: env://ANTHROPIC_API_KEY

routes:
  - match:
      path: /v1/openai/*
      model_prefix: gpt-
    primary:
      provider: openai
    cache:
      enabled: true
      ttl: 3600
    retry:
      max_attempts: 3
      initial_backoff_ms: 500
    fallbacks:
      - provider: anthropic
        trigger: [upstream_5xx, timeout]

limits:
  - target: { type: key, id: "*" }
    rpm: 1000
    tpm: 200000
    concurrency: 50

budgets: []

observability:
  metrics: true
  tracing:
    enabled: true
    format: json
    otlp_endpoint: null
