server:
  bind: 0.0.0.0:8080
  request_timeout_ms: 600000
  default_project_id: default

storage:
  profile: lite
  sqlite:
    path: ./data/gateway.db
    max_size_mb: 10240
    log_retention_days: 30
  cache:
    l1_memory_mb: 256
    l2_max_size_mb: 1024

admin:
  root_token_env: GATEWAY_ROOT_TOKEN
  password_login: true

providers:
  openai:
    base_url: https://api.openai.com
    credential_ref: env://OPENAI_API_KEY
  doubao:
    kind: openai-compatible
    base_url: https://ark.cn-beijing.volces.com/api/v3
    credential_ref: env://DOUBAO_API_KEY
  anthropic:
    base_url: https://api.anthropic.com
    credential_ref: env://ANTHROPIC_API_KEY

routes:
  - match:
      namespace: audiobook
    primary:
      provider: doubao
    cache:
      enabled: true
      ttl: 3600
    retry:
      max_attempts: 3
      initial_backoff_ms: 500
    fallbacks:
      - provider: openai
        trigger: [upstream_5xx, timeout]
limits:
  - target: { type: key, id: "*" }
    rpm: 1000
    tpm: 200000
    concurrency: 50

budgets: []

observability:
  metrics: true
  tracing:
    enabled: true
    format: json
    otlp_endpoint: null
