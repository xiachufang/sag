<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Simple AI Gateway</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f7f7f8;
    --panel: #ffffff;
    --border: #e5e5e8;
    --text: #1c1c1f;
    --muted: #6b7280;
    --accent: #2f6feb;
    --danger: #d23f3f;
    --code: #f2f2f4;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1115;
      --panel: #181b22;
      --border: #2a2e38;
      --text: #e8e8ea;
      --muted: #9aa0aa;
      --accent: #7aa6ff;
      --danger: #ef5a5a;
      --code: #11141a;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font: 14px/1.45 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; border-bottom: 1px solid var(--border); background: var(--panel); }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  nav { display: flex; gap: 16px; }
  nav a { color: var(--muted); text-decoration: none; font-weight: 500; padding: 4px 8px; border-radius: 6px; }
  nav a.active { color: var(--accent); background: rgba(47,111,235,0.08); }
  main { max-width: 1200px; margin: 0 auto; padding: 24px; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 18px 20px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
  button { background: var(--accent); color: white; border: 0; border-radius: 6px; padding: 8px 14px; font-weight: 500; cursor: pointer; font-size: 13px; }
  button.secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
  button.danger { background: var(--danger); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  input, select { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text); font: inherit; }
  input:focus, select:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .muted { color: var(--muted); }
  .code { font-family: ui-monospace, "SF Mono", Menlo, monospace; background: var(--code); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .login-card { width: 360px; max-width: 100%; }
  .login-card .panel { padding: 28px; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .field label { font-size: 12px; color: var(--muted); }
  .row { display: flex; gap: 10px; align-items: stretch; }
  .row > * { flex: 1; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; background: var(--code); color: var(--muted); }
  .pill.ok { background: rgba(60,160,90,0.18); color: #4ec47e; }
  .pill.err { background: rgba(210,63,63,0.18); color: #ef7373; }
  .secret-banner { background: rgba(60,160,90,0.12); border: 1px solid rgba(60,160,90,0.35); padding: 14px 16px; border-radius: 8px; margin-bottom: 16px; }
  .secret-banner .code { display: block; padding: 10px; margin-top: 8px; word-break: break-all; }
  .status-msg { color: var(--danger); font-size: 13px; min-height: 18px; }
  .right { float: right; }
  tr.clickable { cursor: pointer; }
  tr.clickable:hover { background: rgba(122,166,255,0.06); }
  .drawer-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: none; align-items: stretch; justify-content: flex-end; z-index: 20; }
  .drawer-bg.open { display: flex; }
  .drawer { width: min(720px, 100%); background: var(--panel); border-left: 1px solid var(--border); overflow-y: auto; padding: 24px 24px 60px; }
  .drawer h3 { margin: 0 0 6px; font-size: 16px; }
  .drawer pre { background: var(--code); padding: 12px; border-radius: 6px; overflow: auto; font-size: 12px; max-height: 320px; }
  .drawer .row { gap: 16px; }
  .drawer label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
const $ = (sel, el = document) => el.querySelector(sel);

const Store = {
  get token() { return localStorage.getItem("gw_token"); },
  set token(v) { v ? localStorage.setItem("gw_token", v) : localStorage.removeItem("gw_token"); },
  get who() { return localStorage.getItem("gw_who"); },
  set who(v) { v ? localStorage.setItem("gw_who", v) : localStorage.removeItem("gw_who"); },
};

async function api(path, opts = {}) {
  const headers = Object.assign({}, opts.headers || {});
  if (Store.token) headers["Authorization"] = `Bearer ${Store.token}`;
  if (opts.body && typeof opts.body !== "string") {
    headers["Content-Type"] = "application/json";
    opts.body = JSON.stringify(opts.body);
  }
  const res = await fetch(path, { ...opts, headers });
  if (res.status === 401) { Store.token = null; renderRoute("#/login"); throw new Error("unauthorized"); }
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`${res.status}: ${txt}`);
  }
  const ct = res.headers.get("content-type") || "";
  return ct.includes("application/json") ? res.json() : res.text();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

function fmtTs(ms) {
  if (!ms) return "-";
  return new Date(ms).toISOString().replace("T", " ").replace(/\.\d+Z$/, "Z");
}

function navHtml(active) {
  const items = [["#/keys", "Keys"], ["#/logs", "Logs"], ["#/cost", "Cost"]];
  return `<nav>${items.map(([h,l])=>`<a href="${h}" class="${active===h?'active':''}">${l}</a>`).join("")}</nav>`;
}

function headerHtml(active) {
  const who = Store.who || "";
  return `<header>
    <h1>Simple AI Gateway</h1>
    ${navHtml(active)}
    <div class="muted">${escapeHtml(who)} <button class="secondary" onclick="window.logout()">Logout</button></div>
  </header>`;
}

window.logout = () => { Store.token = null; Store.who = null; renderRoute("#/login"); };

async function viewLogin() {
  document.body.innerHTML = `
    <div class="login-wrap">
      <div class="login-card">
        <div class="panel">
          <h2 style="margin:0 0 18px 0">Sign in</h2>
          <form id="lf">
            <div class="field"><label>Username</label><input name="u" autocomplete="username" required></div>
            <div class="field"><label>Password</label><input name="p" type="password" autocomplete="current-password" required></div>
            <button type="submit">Sign in</button>
            <div class="status-msg" id="msg"></div>
          </form>
          <p class="muted" style="margin-top:16px;font-size:12px">Use the root token to create the first admin via:<br>
            <span class="code">POST /admin/admins</span></p>
        </div>
      </div>
    </div>`;
  $("#lf").onsubmit = async (e) => {
    e.preventDefault();
    const u = e.target.u.value, p = e.target.p.value;
    try {
      const r = await api("/admin/auth/login", { method: "POST", body: { username: u, password: p } });
      Store.token = r.token; Store.who = r.username;
      renderRoute("#/keys");
    } catch (err) { $("#msg").textContent = "Login failed"; }
  };
}

async function viewKeys() {
  document.body.innerHTML = `
    ${headerHtml("#/keys")}
    <main>
      <div class="toolbar">
        <input id="kname" placeholder="key name (e.g. prod-svc)">
        <select id="kenv"><option value="live">live</option><option value="test">test</option></select>
        <button onclick="window.createKey()">Create key</button>
      </div>
      <div id="banner"></div>
      <div class="panel"><div id="ktbl">Loading…</div></div>
    </main>`;
  await reloadKeys();
}

async function reloadKeys() {
  try {
    const rows = await api("/admin/keys");
    const html = rows.length === 0 ? `<div class="muted">No keys yet. Create one above.</div>` :
      `<table><thead><tr><th>Name</th><th>Prefix</th><th>Last 4</th><th>Status</th><th>Created</th><th>Last used</th><th></th></tr></thead>
       <tbody>${rows.map(r=>`<tr>
         <td>${escapeHtml(r.name)}</td>
         <td><span class="code">${escapeHtml(r.prefix)}</span></td>
         <td><span class="code">…${escapeHtml(r.last4)}</span></td>
         <td><span class="pill ${r.status==='active'?'ok':'err'}">${r.status}</span></td>
         <td class="muted">${fmtTs(r.created_at)}</td>
         <td class="muted">${fmtTs(r.last_used_at)}</td>
         <td>${r.status==='active'?`<button class="danger secondary" onclick="window.revoke('${r.id}')">Revoke</button>`:''}</td>
       </tr>`).join("")}</tbody></table>`;
    $("#ktbl").innerHTML = html;
  } catch (e) { $("#ktbl").innerHTML = `<div class="status-msg">${escapeHtml(e.message)}</div>`; }
}

window.createKey = async () => {
  const name = $("#kname").value.trim(); const env = $("#kenv").value;
  if (!name) return;
  try {
    const r = await api("/admin/keys", { method: "POST", body: { name, env } });
    $("#banner").innerHTML = `<div class="secret-banner">
      <strong>Secret created. Copy it now — it will not be shown again.</strong>
      <span class="code">${escapeHtml(r.secret)}</span>
    </div>`;
    $("#kname").value = "";
    await reloadKeys();
  } catch (e) { alert(e.message); }
};

window.revoke = async (id) => {
  if (!confirm("Revoke this key?")) return;
  await api(`/admin/keys/${id}`, { method: "DELETE" });
  await reloadKeys();
};

async function viewLogs() {
  document.body.innerHTML = `
    ${headerHtml("#/logs")}
    <main>
      <div class="toolbar">
        <input id="fprov" placeholder="provider (e.g. openai)">
        <input id="fmodel" placeholder="model">
        <select id="fstatus">
          <option value="">any status</option>
          <option value="success">success</option>
          <option value="upstream_error">upstream_error</option>
          <option value="gateway_error">gateway_error</option>
          <option value="timeout">timeout</option>
        </select>
        <button onclick="window.reloadLogs()">Apply</button>
      </div>
      <div class="panel"><div id="ltbl">Loading…</div></div>
    </main>`;
  await reloadLogs();
}

window.reloadLogs = async () => {
  const params = new URLSearchParams();
  const p = $("#fprov").value.trim(); if (p) params.set("provider", p);
  const m = $("#fmodel").value.trim(); if (m) params.set("model", m);
  const s = $("#fstatus").value; if (s) params.set("status", s);
  params.set("limit", "100");
  try {
    const r = await api(`/admin/logs?${params}`);
    const rows = r.items || [];
    const html = rows.length === 0 ? `<div class="muted">No logs yet.</div>` :
      `<table><thead><tr><th>Time</th><th>Provider</th><th>Model</th><th>Endpoint</th><th>Status</th><th>HTTP</th><th>Cached</th><th>Latency</th></tr></thead>
       <tbody>${rows.map(r=>`<tr class="clickable" onclick="window.openLog('${r.id}')">
         <td class="muted">${fmtTs(r.request_ts)}</td>
         <td>${escapeHtml(r.provider||'')}</td>
         <td>${escapeHtml(r.model||'')}</td>
         <td class="muted">${escapeHtml(r.endpoint||'')}</td>
         <td><span class="pill ${r.status==='success'?'ok':'err'}">${escapeHtml(r.status)}</span></td>
         <td>${r.http_status||''}</td>
         <td>${r.cached?'✓':''}</td>
         <td class="muted">${r.duration_ms!=null?r.duration_ms+' ms':''}</td>
       </tr>`).join("")}</tbody></table>
       <div class="drawer-bg" id="drawerBg" onclick="window.closeLog(event)">
         <div class="drawer" id="drawerBody" onclick="event.stopPropagation()"></div>
       </div>`;
    $("#ltbl").innerHTML = html;
  } catch (e) { $("#ltbl").innerHTML = `<div class="status-msg">${escapeHtml(e.message)}</div>`; }
};

window.openLog = async (id) => {
  $("#drawerBg").classList.add("open");
  $("#drawerBody").innerHTML = `<div class="muted">Loading…</div>`;
  try {
    const d = await api(`/admin/logs/${id}`);
    const meta = d.metadata ? JSON.stringify(d.metadata, null, 2) : "";
    $("#drawerBody").innerHTML = `
      <h3>Request <span class="code">${escapeHtml(d.id)}</span></h3>
      <p class="muted">${fmtTs(d.request_ts)}</p>
      <div class="row" style="margin-bottom:14px">
        <div><label>Provider</label><div>${escapeHtml(d.provider||'-')}</div></div>
        <div><label>Model</label><div>${escapeHtml(d.model||'-')}</div></div>
        <div><label>Endpoint</label><div class="muted">${escapeHtml(d.endpoint||'-')}</div></div>
      </div>
      <div class="row" style="margin-bottom:14px">
        <div><label>Status</label><div><span class="pill ${d.status==='success'?'ok':'err'}">${escapeHtml(d.status)}</span> ${d.http_status||''}</div></div>
        <div><label>Cached</label><div>${d.cached?'yes':'no'}</div></div>
        <div><label>Retries</label><div>${d.retry_count||0}</div></div>
        <div><label>Fallback</label><div>${escapeHtml(d.fallback_used||'-')}</div></div>
      </div>
      <div class="row" style="margin-bottom:14px">
        <div><label>Duration</label><div>${d.duration_ms!=null?d.duration_ms+' ms':'-'}</div></div>
        <div><label>Upstream</label><div>${d.upstream_ms!=null?d.upstream_ms+' ms':'-'}</div></div>
        <div><label>TTFB</label><div>${d.ttfb_ms!=null?d.ttfb_ms+' ms':'-'}</div></div>
      </div>
      <div class="row" style="margin-bottom:14px">
        <div><label>Prompt tokens</label><div>${d.prompt_tokens??'-'}</div></div>
        <div><label>Completion</label><div>${d.completion_tokens??'-'}</div></div>
        <div><label>Cached tokens</label><div>${d.cached_tokens??'-'}</div></div>
        <div><label>Total</label><div>${d.total_tokens??'-'}</div></div>
      </div>
      ${meta?`<label>Metadata</label><pre>${escapeHtml(meta)}</pre>`:''}
      <label>Request body</label><pre>${escapeHtml(d.request_body||'-')}</pre>
      <label>Response body</label><pre>${escapeHtml(d.response_body||'-')}</pre>
      ${d.error_message?`<label>Error</label><pre>${escapeHtml(d.error_message)}</pre>`:''}`;
  } catch (e) { $("#drawerBody").innerHTML = `<div class="status-msg">${escapeHtml(e.message)}</div>`; }
};

window.closeLog = (e) => {
  if (!e || e.target.id === "drawerBg") $("#drawerBg").classList.remove("open");
};

async function viewCost() {
  document.body.innerHTML = `
    ${headerHtml("#/cost")}
    <main>
      <div class="toolbar">
        <select id="cgroup">
          <option value="provider,model">by provider+model</option>
          <option value="day">by day</option>
          <option value="provider,model,day">by provider+model+day</option>
          <option value="gateway_key">by key</option>
        </select>
        <button onclick="window.reloadCost()">Apply</button>
      </div>
      <div class="panel" id="budgetsPanel" style="margin-bottom:16px"></div>
      <div class="panel" id="costPanel">Loading…</div>
    </main>`;
  await reloadBudgets();
  await reloadCost();
}

window.reloadBudgets = async () => {
  try {
    const list = await api("/admin/budgets");
    if (!list.length) { $("#budgetsPanel").innerHTML = `<div class="muted">No budgets configured.</div>`; return; }
    $("#budgetsPanel").innerHTML = `<h3 style="margin:0 0 10px;font-size:14px">Budgets</h3>
      ${list.map(b => {
        const pct = Math.min(100, Math.max(0, Math.round(b.pct*100)));
        const color = b.blocked ? 'var(--danger)' : (pct>=80?'#d29a1a':'var(--accent)');
        return `<div style="margin:8px 0">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span><strong>${escapeHtml(b.name)}</strong> <span class="muted">(${escapeHtml(b.period)})</span></span>
            <span class="muted">$${b.used_usd.toFixed(4)} / $${b.amount_usd.toFixed(2)} (${pct}%)${b.blocked?' • BLOCKED':''}</span>
          </div>
          <div style="height:8px;background:var(--code);border-radius:4px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:${color}"></div>
          </div>
        </div>`;
      }).join("")}`;
  } catch (e) { $("#budgetsPanel").innerHTML = `<div class="status-msg">${escapeHtml(e.message)}</div>`; }
};

window.reloadCost = async () => {
  const gb = $("#cgroup").value;
  try {
    const r = await api(`/admin/cost?group_by=${encodeURIComponent(gb)}`);
    const groups = r.groups || [];
    const headers = Object.keys(groups[0]?.key || {});
    const html = groups.length === 0 ? `<div class="muted">No cost data yet. Make a few requests with a known model first.</div>` :
      `<div style="margin-bottom:10px">Total: <strong>$${r.total_cost_usd.toFixed(6)}</strong></div>
       <table><thead><tr>${headers.map(h=>`<th>${escapeHtml(h)}</th>`).join("")}
          <th>requests</th><th>prompt</th><th>completion</th><th>cost (USD)</th><th>savings</th></tr></thead>
       <tbody>${groups.map(g=>`<tr>
         ${headers.map(h=>`<td>${escapeHtml(g.key[h]||'-')}</td>`).join("")}
         <td>${g.requests}</td>
         <td>${g.prompt_tokens}</td>
         <td>${g.completion_tokens}</td>
         <td>$${g.cost_usd.toFixed(6)}</td>
         <td class="muted">$${g.cached_savings_usd.toFixed(6)}</td>
       </tr>`).join("")}</tbody></table>`;
    $("#costPanel").innerHTML = html;
  } catch (e) { $("#costPanel").innerHTML = `<div class="status-msg">${escapeHtml(e.message)}</div>`; }
};

async function renderRoute(route) {
  if (!route || route === "#/" || route === "") route = Store.token ? "#/keys" : "#/login";
  if (!Store.token && route !== "#/login") { window.location.hash = "#/login"; return; }
  if (route === "#/login") return viewLogin();
  if (route === "#/keys") return viewKeys();
  if (route === "#/logs") return viewLogs();
  if (route === "#/cost") return viewCost();
  return viewKeys();
}

window.addEventListener("hashchange", () => renderRoute(window.location.hash));
renderRoute(window.location.hash);
</script>
</body>
</html>
